front:
  text: 原序癲狂條辨邑郭楚賢先生著也先生精岐黃術於此道別有薪傳治者罔不應手輒愈所活不下數百人而先生尤不敢以枕中之祕獨得居奇癸亥冬余有寒溫條辨之刊先生遂以此編囑余願付剞劂以公諸世余觀古今醫書汗牛充棟而茲證獨略非故略也特無專科耳舉世莫察遂以鬼怪治之其貽誤豈淺鮮哉乃以栗山先生之書與先生之書合觀焉乃知狂之迥別乎癲猶溫疫之迥別乎傷寒也傷寒與癲則一內一外兩不相侔若狂實即溫疫之變證也栗山先生言溫疫之雜氣由口鼻而直入三焦先生言狂之變證其審穴專在三焦又可先生言溫疫在半表半裡先生言狂之初起痰在肝熱在膽非證之出於少陽乎栗山言傷寒自外之內溫疫自內之外先生言傷寒由外傳內狂證由內傳外非雜氣之均伏於裡乎栗山先生言傷寒少而溫疫多先生言癲證少而狂證多惟癲證不概見故編中重在狂證立論非與栗山先生之略傷寒而重溫疫者如出一轍乎況溫疫亦有譫語狂叫棄衣登高等證其方藥亦復相仿則又證之顯相類者也故栗山先生有寒溫之條辨余又因先生之辨而更增一條耳所異者疫證有外邪而無內郁狂證有外邪而兼有內郁癲證則無外邪而止有內郁蓋癲之癡迷昏憒由憂思鬱結痰迷心竅也內邪也陰也疫之發熱咽燥癘氣之伏於裡而浮越於表也外邪也陽也狂則憂鬱之氣結於臟瘴癘之氣復入於腑內邪與外邪交戰於臟腑之間即欲浮越於表而不能所以身無寒熱而怪證百出及陰陽混雜也故編中治顛僅溫中解鬱以理痰盡矣治狂則以理痰為先清火次之蓋理痰以治其內清火以治其外標本兼治而法備矣其辨證下方條理井然學者誠當奉為矩矱至於觸類旁通增減變化則在神而明之者同治二年癸亥一栗主人周崇第謹識
