body:
  text: 癲狂總論或有問於豫曰癲狂胡為而作也豫應之曰人受天地之中以生不外陰陽氣化陰陽和則百病不生陰陽乖則邪氣易入故人感之即發為異病癲狂者病之異也感之淺則治之易感之深則治之難惟治之有要斯亦易而無難耳曰然則治之奈何曰是必有專方乃能對症下藥若不得師指授則虛實不明陰陽莫辨何從措手哉曰其本源若何曰是症不外憂思鬱結痰火夾攻延及五臟因有闡笑歌泣等症須知癲症專責乎痰痰火夾攻則狂也蓋火屬陽而常動故有傳經之變痰屬陰而常靜故有結聚之堅痰本不動其動者火逼之也狂雖有傳變又與傷寒傳經異傷寒自外而入狂則自內而出傷寒始於太陽膀胱一日一傳狂則始於厥陰肝次傳心次傳脾次傳肺次傳腎至腎不愈則又反而傳肝要之心為君主之官神明出焉邪不入心天君泰然百體從令焉能為患蓋優思則傷脾郁久而怒則傷肝土鬱而木復克之此痰所由生也痰迷心竅而昏憒作矣嵐瘴戾氣伏入於裡積久成熱此火所由生也火的心君而妄念作矣內亂既生外侮因而乘之痰火觸逼兩相夾攻心神亦因之擾亂而諧狂作矣其或棄衣逃匿逾牆上屋風熱相爭也呼神叫鬼晝夜不寐神不守舍也採青摘葉肝風動也擢土破物風熱入脾也時而收物藏匿邪入於陰也時而拋物棄外邪出於陽也不拒水火不拘生熟陰陽混雜也更可奇者前之所為言之了了目今所為毫不省著蓋痰在裡而熱在表也治是症者須察症候起於何經虛實貴乎明辨豈得以痰火概治之以硝黃陳半統治之哉分辨數條縷列於後審脈以辨虛實經曰癲之始發意不樂直視僵仆其脈三部俱陰又曰狂之始發少臥而不飢自高賢也自辨智也自貴據也妄笑樂歌舞行走不休其脈三部俱陽故癡迷而知畏懼者陰也不足也癲也忿怒而莫可制者陽也有餘也狂也而尤宜辨者人雖知虛實之治不同而不知癲症少而狂症多患斯病者癲症不過百中一二故脈每多實強善治者不得忽視夫脈亦不得徒泥乎脈脈症參觀斯為盡善審色以辨淺深欲知症之真偽須察耳後穴經系青紫色目斜視而白珠色紅者夾無疑焉其穴在耳後系三焦經之顱息穴觀銅人圖便知初起之時穴上有紋二條上衝髮際當察以辨其病在何經在肝色青在心色赤在脾色淡黃在肺色淡白在腎色黑病退則散若紋漸收縮凝而成珠形如豆粒則難治矣如恐未的可再用青油燃紙令患者向火久視目中定現五色彩暈亦以紅青黃白黑分心肝脾肺腎現某色者即屬某經或全現者病流五臟若經紋之色隱而不現火光之色亦不現即宜以獨活湯一二劑升發之後仍不現非病之將散即屬他症又當參詳再辨舌色初起色深紅熱燥極色黃若用硝黃太早則色轉黑又宜以升陽散火湯主之若胎如積粉即屬疫症以達原飲主之又觀面色以驗生克或面黃而內現青為木剋土或面白而內現赤為火剋金凡五行相剋者準此俱宜以一補一泄之法治之審症以辨經絡癲之始發不過癡迷昏憒而已元他症也狂之始發身無寒熱心神昏迷狂妄相乘譫語疊作似有邪祟依附以故喜怒哀樂失其正愛惡情欲反其常言則無非神抵見則無非妖怪或社壇禮拜凡呼天誓地甚至裸體忘羞遠方逃匿種種異狀難以枚舉其見證大要有五一曰悲泣也熱在膽痰在肝肝與膽相通則熱炎於肝而氣不暢故悲而泣也二曰喜笑也熱在小腸痰在心心與小腸相通則熱炎於心心血上升故喜而笑也三歌樂也熱在大腸痰在肺肺與大腸相通則熱炎於肺肺竅氣塞則氣逼熱邪而散於脾子入母懷故樂而歌也四曰詈惡也熱在胃痰在脾脾與胃相通則熱炎於脾脾土燥極故詈而惡也五曰闡怒也熱在膀胱痰在腎腎與膀胱相通則熱蓄下焦水不生木而肝燥故怒而闡也至登堂上坐男稱帝女稱佛則邪已傳胃一下即愈此狂症之常也時而棄衣狂走逾牆上屋行窄徑如行平地或側退或棄履或言語不倫此五行混雜五臟合病也時而仰觀為火有餘時而俯視為水有餘時而左顧右盼如見五色精兵天仙往來神鬼相攻此則五行互克病愈深而治愈難矣世俗每見前證疑有魔鬼相攻輒以巫師治之實非鬼也乃狂症之變也總之不離乎痰者近是然五臟見證間印內經不合大抵病為怪病而理亦相反謹導師授亦我用我法云爾審方以辨先後或病之初起或初接他人手審症未的俱宜以獨活湯升發之次則依各條主方治之或隨症變通或隨方增減神而明之則存乎其人但不可先用補劑阻塞經絡以致不可救藥亦不可遽用硝黃致痰為寒涼所陷凝結不散總以理痰為先清火次之若血蓄下焦及病已傳胃即宜急以硝黃下之既下之後又當救陰或以金水六君煎主之若直中癲症則又以溫中升陽為主寒涼斷不可用獨活湯獨活羌活川芎當歸細辛桂枝人參石蒲云神志肉法夏陳皮白薇甘草升陽散火湯紅胡北風葛根升麻羌活獨活人參白芍甘草生薑大棗金水六君煎熟地當歸陳皮法夏茯苓甘草達原飲檳榔草果厚朴知母黃芩白芍甘草五臟分治法邪傳肝經則泣以清風飲子主之或羚羊角散犀角地黃湯加柴苓亦可清風飲子青黛防風膽星梔子香附羚羊角散川芎當歸棗仁茯神香附獨活防風苡仁杏仁廣香炙草生薑犀角地黃湯犀角白芍丹皮生地邪傳心經則血旺故多言多笑以天黃散主之或導赤散亦可天黃散花粉黃連導赤散生地木通草梢淡竹葉邪傳於脾氣不能舒則署以柴陳湯主之或二石滾痰丸滌痰湯越鞠丸亦可柴陳湯紅胡法夏陳皮茯苓黃芩甘草二石滾痰丸法夏陳皮茯苓香附石蒲鬱金礞石海石膽草甘草滌痰湯法夏細辛橘紅人參茯苓石蒲枳實熟軍甘草竹茹越鞠丸法夏砂仁蒼朮川芎陳皮茯苓梔子香附甘草邪傳於肺則壅塞肺竅必歌必喊叫以潤肺飲主之潤肺飲知母貝母花粉桔梗陳皮麥冬茯苓甘草邪傳於胃則血蓄下焦故闡怒以桃仁承氣湯主之桃仁承氣湯桃仁桂枝熟軍玄明粉甘草邪傳於胃則病將愈然有男女之分在女必稱神佛之尊在男必稱帝位之尊急宜下之以導痰承氣湯主之導痰承氣湯知母厚朴海石陳皮法夏茯苓鬱金枳實粉葛莊黃甘草五臟合病治法凡翻壇打廟逾牆上屋棄衣棄履狂走倒退行徑拜揖等證皆五臟合病五行混雜宜調和營衛清熱化痰以五臟飲主之或八味逍遙散亦可若仰觀俯視左顧右盼而面色又相剋此亦五行混雜病必糾纏亦以五臟飲加減調養可也五臟飲法夏陳皮茯苓知母貝母香附膽草花粉黃連梔子甘草伏火上炎治法患延日久伏火上炎則邪著於腎故好淫男女皆同用知柏地黃湯主之知柏地黃湯知母黃柏乾地黃牡丹皮澤泄山茱萸茯苓懷山藥狂轉癲症治法狂症轉顛皆因泄熱太早痰為寒涼所凝痰陷諸竅則癲也以回陽升麻湯主之回陽升麻湯熟地人參附塊乾薑當歸升麻甘草直中癲症治法直中癲症因陰邪內積抑鬱難伸故不語不樂默默如醉目光直視無時顛仆三部之脈俱虛宜回陽升麻湯主之或附桂理陰煎胡椒理中湯亦妙回陽升麻湯見前附桂理陰煎熟地當歸肉桂北薑附子炙草胡椒理中湯川椒蓽茇北薑細辛附子白朮陳皮款冬炙草心神不安治法諸證皆可參入風熱邪痰相攻心神不安宜五福飲主之五福飲竹葉錢側柏葉半錢陳壁土兩共煎水一碗用稱匜燒紅以藥水淬之溫服將愈吉兆證見掃屋拂塵最佳臟腑痰除熱退指日清順矣以完功蕩滌丸主之家傳完功蕩滌丸恐除邪未盡以方蕩滌之礞石海石陳皮法夏西莊枳實香附鉤藤天麻知母川朴葶藶芒硝人參茯苓沉香麝香甘草研末飯丸孕婦去麝香加竺黃愈後宜調理是症有一治而愈者有久治而後愈者有愈後略欠調理數月復發者最難治故治此病者宜拔其根本劫其巢穴寬之以歲月養之以優遊方保無反復之憂或用天王補心丹或金水六君煎主之天王補心丹地黃人參丹參玄參桔梗五味當歸遠志天冬麥冬柏仁棗仁茯神金水六君煎見前應用諸方吐法鹽刀散用鐵刀一把將鹽五錢置刀繡上放碗中以淡竹葉煎濃湯傾於內澄清服之白金丸白礬兩鬱金兩共研細末飯糊丸硃砂為衣薑湯下二方隨用以之吐痰家傳化邪丸妄言邪鬼尚未言神此方主之真琥珀鬼箭羽蒼朮共研末飯糊丸硃砂為衣薑湯下四七湯人參延胡索法夏官桂甘草服蠻煎生地麥冬白芍石蒲石斛丹皮茯神陳皮木通知母防風通聖散熟軍明粉荊芥麻絨梔仁白芍連翹桔梗川芎當歸石膏滑石薄荷黃芩白朮防風甘草逍遙散當歸白芍紅胡茯苓白朮薄荷甘草生薑本方加丹皮梔仁名八味逍遙散生鐵落飲以鐵落一升用水二斗煮取一斗入後項藥煮至五升用竹瀝兌服之鐵落即鐵屎石膏龍齒醋煅茯苓防風玄參秦艽竹淚二石滾痰丸滌痰湯越鞠丸羚羊角散犀角地黃湯天王補心丹俱見前以上應用諸方隨證加減用之附痰飲辨在脾經者名曰濕痰以二陳湯主之二陳湯法夏茯苓陳皮甘草在肺經者名曰燥痰其痰澀而難出以利金湯潤肺飲主之利金湯貝母茯苓陳皮枳殼桔梗甘草潤肺飲見前在肺經名曰風痰其痰清而多泡以防風丸川芎丸主之防風丸防風天麻川芎硃砂甘草川芎丸川芎細辛防風薄荷桔梗甘草在心經名曰熱痰其痰堅而多塊以天竺散主之天竺散南星制法夏黃芩官桂天竺黃在腎經名曰寒痰其痰有黑點而多稀以薑桂丸主之薑桂丸泡薑肉桂白朮廣皮法夏人參茯苓炙草又有五飲之號其人素盛今羸水走腸間漉漉有聲名曰痰飲以桂苓朮甘湯主之桂苓朮甘湯桂枝茯苓白朮甘草水流脅下咳唾引痛名曰懸飲以十棗湯主之十棗湯大戟芫花甘遂南星制大棗水流四肢身體疼痛名曰溢飲以大青龍湯主之大青龍湯麻黃桂枝杏仁石膏甘草薑棗引咳逆倚息氣短不得臥其形如醉名曰支飲以五苓散主之五苓散白朮茯苓朱苓澤泄上桂膈滿嘔吐喘咳寒熱腰背痛目淚出身瞤惕振振惡寒名曰伏飲以倍術丸主之倍術丸白朮桂心官桂更有一種非痰非飲時吐白沫不甚稠黏此脾虛不能約束津液也宜六君子湯加益智仁症各不同治迥異司命者慎之六君子湯人參白朮茯苓法夏陳皮炙草附録癲犬咬方人或被咬或銜衣或觸氣皆能使人發狂於初咬之時即服人參敗毒散加地榆紫竹根一二劑至七日以生黃豆試之如口不知生氣心不作嘔逆又再服一二劑至二七又照前試之如毒未盡又再服三七亦如前試之至口知生氣則毒盡矣永不復發即毒已發以此方灌之亦可起死回生屢試屢驗之方慎毋以平淡而忽之也人參敗毒散人參茯苓羌活獨活川芎薄荷前胡紅胡枳殼桔梗甘草地榆紫竹根再加婆婆針同煎更妙此藥稀少草本葉對節生頂有蕊內有白毛黑針即單用酒兌亦佳雖已成形亦化水而下又方路邊荊一斤一半用青黛炒一半用黃土水炒五六日內服完即與前方並服亦可
